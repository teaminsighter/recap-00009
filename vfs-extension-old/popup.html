<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 380px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    color: #333;
    background: #f8f9fa;
  }

  .header {
    background: linear-gradient(135deg, #1a237e, #283593);
    color: white;
    padding: 16px;
    text-align: center;
  }

  .header h1 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .header .sub {
    font-size: 11px;
    opacity: 0.8;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: white;
    border-bottom: 1px solid #e0e0e0;
  }

  .status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.red { background: #e53935; }
  .status-dot.yellow { background: #fdd835; }
  .status-dot.green { background: #43a047; }

  .status-text {
    flex: 1;
    font-size: 12px;
  }

  .status-email {
    font-size: 11px;
    color: #666;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .section {
    padding: 12px 16px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  button {
    flex: 1;
    padding: 10px 12px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: #1a237e;
    color: white;
  }

  .btn-success {
    background: #2e7d32;
    color: white;
  }

  .btn-warning {
    background: #f57f17;
    color: white;
  }

  .btn-danger {
    background: #c62828;
    color: white;
  }

  .btn-secondary {
    background: #e0e0e0;
    color: #333;
  }

  .auto-check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: white;
    border-radius: 6px;
    border: 1px solid #e0e0e0;
    margin-bottom: 8px;
  }

  .auto-check-row label {
    flex: 1;
    font-weight: 500;
  }

  .auto-check-row input[type="number"] {
    width: 50px;
    padding: 4px 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
    text-align: center;
    font-size: 13px;
  }

  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    cursor: pointer;
  }

  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle .slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 24px;
    transition: 0.3s;
  }

  .toggle .slider:before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }

  .toggle input:checked + .slider {
    background: #43a047;
  }

  .toggle input:checked + .slider:before {
    transform: translateX(20px);
  }

  .result-box {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 10px;
    max-height: 200px;
    overflow-y: auto;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 11px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-all;
    display: none;
  }

  .result-box.visible {
    display: block;
  }

  .result-box.slots-found {
    border-color: #43a047;
    background: #e8f5e9;
  }

  .result-box.error {
    border-color: #e53935;
    background: #ffebee;
  }

  .last-check {
    font-size: 11px;
    color: #999;
    text-align: center;
    padding: 4px;
  }

  .custom-call {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }

  .custom-call.visible {
    display: flex;
  }

  .custom-call select, .custom-call input {
    padding: 6px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 12px;
  }

  .custom-call .row {
    display: flex;
    gap: 6px;
  }

  .custom-call select {
    width: 80px;
  }

  .custom-call input {
    flex: 1;
  }

  .token-box {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }

  .token-box.visible {
    display: flex;
  }

  .token-label {
    font-size: 11px;
    font-weight: 600;
    color: #555;
    margin-top: 4px;
  }

  .token-value {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 6px 8px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 10px;
    line-height: 1.3;
    word-break: break-all;
    max-height: 60px;
    overflow-y: auto;
    cursor: pointer;
    position: relative;
  }

  .token-value:hover {
    border-color: #1a237e;
    background: #f0f0ff;
  }

  .token-value .copy-hint {
    display: none;
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 9px;
    color: #1a237e;
    font-family: sans-serif;
  }

  .token-value:hover .copy-hint {
    display: inline;
  }

  .copied-msg {
    display: none;
    font-size: 11px;
    color: #43a047;
    font-weight: 500;
    text-align: center;
    padding: 2px;
  }

  .copied-msg.visible {
    display: block;
  }

  .footer {
    padding: 8px 16px;
    text-align: center;
    border-top: 1px solid #e0e0e0;
  }

  .footer button {
    font-size: 11px;
    padding: 4px 10px;
  }

  .slots-alert {
    display: none;
    background: #43a047;
    color: white;
    padding: 12px 16px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
    animation: pulse 1s infinite;
  }

  .slots-alert.visible {
    display: block;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>VFS Slot Checker</h1>
  <div class="sub">Login to VFS normally, then check slots here</div>
</div>

<div class="slots-alert" id="slotsAlert">
  APPOINTMENT SLOTS AVAILABLE!
</div>

<div class="status-bar">
  <div class="status-dot red" id="statusDot"></div>
  <div>
    <div class="status-text" id="statusText">Not connected</div>
    <div class="status-email" id="statusEmail"></div>
  </div>
</div>

<div class="section">
  <div class="section-title">Actions</div>
  <div class="btn-row">
    <button class="btn-primary" id="btnSlots" disabled>Check Slots</button>
    <button class="btn-primary" id="btnStatus" disabled>Check Status</button>
  </div>

  <div class="auto-check-row">
    <label>Auto-Check</label>
    <span style="font-size:11px;color:#888">every</span>
    <input type="number" id="intervalInput" value="30" min="10" max="300">
    <span style="font-size:11px;color:#888">sec</span>
    <label class="toggle">
      <input type="checkbox" id="autoToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="btn-row">
    <button class="btn-success" id="btnTokens" disabled>Show Tokens</button>
    <button class="btn-secondary" id="btnCustom">Custom API Call</button>
  </div>

  <div class="token-box" id="tokenBox">
    <div class="token-label">clientsource (fresh - click to copy)</div>
    <div class="token-value" id="tokenCS" title="Click to copy"><span class="copy-hint">click to copy</span></div>
    <div class="token-label">authorize (click to copy)</div>
    <div class="token-value" id="tokenAuth" title="Click to copy"><span class="copy-hint">click to copy</span></div>
    <div class="token-label">route</div>
    <div class="token-value" id="tokenRoute" title="Click to copy"><span class="copy-hint">click to copy</span></div>
    <div class="token-label">email</div>
    <div class="token-value" id="tokenEmail" title="Click to copy"><span class="copy-hint">click to copy</span></div>
    <div class="token-label">timestamp (UTC)</div>
    <div class="token-value" id="tokenTS"></div>
    <div class="copied-msg" id="copiedMsg">Copied!</div>
    <div class="btn-row" style="margin-top:6px">
      <button class="btn-success" id="btnRefreshToken">Refresh Token</button>
      <button class="btn-primary" id="btnFetchWithToken">Fetch Slots</button>
    </div>
    <div class="token-label" id="fetchResultLabel" style="display:none">API Response</div>
    <div class="result-box" id="fetchResultBox" style="margin-top:4px"></div>
  </div>

  <div class="custom-call" id="customCallBox">
    <div class="row">
      <select id="callMethod">
        <option value="GET">GET</option>
        <option value="POST" selected>POST</option>
      </select>
      <input type="text" id="callEndpoint" placeholder="appointment/slots">
    </div>
    <input type="text" id="callBody" placeholder='{"key":"value"} (optional for POST)'>
    <button class="btn-warning" id="btnCallSend">Send Request</button>
  </div>
</div>

<div class="section" style="padding-top:0">
  <div class="last-check" id="lastCheck"></div>
  <div class="result-box" id="resultBox"></div>
</div>

<div class="footer">
  <button class="btn-danger" id="btnReset" style="flex:none;width:auto">Reset All</button>
</div>

<script src="popup.js"></script>
</body>
</html>
